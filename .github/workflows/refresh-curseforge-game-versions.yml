name: Refresh CurseForge game versions

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    name: Refresh
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Fetch CurseForge API
        run: |
          mkdir -p data
          curl -fsSL -H "X-Api-Token: ${{ secrets.CURSEFORGE_TOKEN }}" -o "data/curseforge-game-versions.json" "https://minecraft.curseforge.com/api/game/versions"

      - name: Commit changes
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@noreply.github.com"
          
          git add data/curseforge-game-versions.json
          git commit -m "chore(data): Update CurseForge game versions"
          
          git push origin main
